name: Publish to npm

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '**.mdx'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to push version bump commit
      id-token: write  # required for npm Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '24'  # Node 22.14+ required for Trusted Publishing
          registry-url: 'https://registry.npmjs.org'

      - name: Ensure npm 11.5.1+ for Trusted Publishing
        run: npm install -g npm@latest

      - name: Configure npm auth (install only; publish uses OIDC)
        run: echo "//registry.npmjs.org/:_authToken=$NODE_AUTH_TOKEN" >> .npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify npm auth for install
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::NODE_AUTH_TOKEN is empty. Add NPM_TOKEN (read-only) for private deps."
            exit 1
          fi
          npm whoami || (echo "::error::npm whoami failed - token needs read access to @the-real-insight" && exit 1)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - run: npm run build

      - name: Bump version
        run: npm version patch --no-git-tag-version

      - name: Publish to npm (Trusted Publishing via OIDC)
        run: |
          # Remove token so npm uses OIDC for publish (Trusted Publishing)
          sed -i '/_authToken/d' .npmrc 2>/dev/null || true
          # Retry: 409 often means npm is still processing a previous publish
          for i in 1 2 3 4 5; do
            npm publish --access public && break
            [ $i -eq 5 ] && exit 1
            echo "Publish failed, retrying in 15s (attempt $i/5)..."
            sleep 15
          done

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git diff --staged --quiet || git commit -m "chore: bump version [skip ci]"
          git push
