name: Publish to npm

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '**.mdx'
      - '.github/workflows/**'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to push version bump commit
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify npm auth
        run: |
          echo "NODE_AUTH_TOKEN length: ${#NODE_AUTH_TOKEN}"
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::NODE_AUTH_TOKEN is empty. Add NPM_TOKEN as a repository secret (Settings → Secrets → Actions)."
            exit 1
          fi
          npm whoami || (echo "::error::npm whoami failed - token may be expired or lack read access to @the-real-insight" && exit 1)

      - run: npm ci
      - run: npm run build

      - name: Bump version
        run: npm version patch --no-git-tag-version

      - name: Publish to npm
        run: npm publish --provenance --access public

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git diff --staged --quiet || git commit -m "chore: bump version [skip ci]"
          git push
